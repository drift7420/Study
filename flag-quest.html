<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Quest</title>
<style>
  :root {
    --paper:#F5F4EF; --ink:#16243B; --red:#C8322B; --green:#2A7F62;
    --line:#d8d6cf; --mut:#7c8290; --faint:#a8adb8;
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--paper); color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
  .shell { max-width:640px; margin:0 auto; padding:24px 16px 48px; }
  .eyebrow { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--mut); }
  .title { font-family:Georgia,'Times New Roman',serif; font-size:28px; font-weight:700; margin-top:2px; }
  .pbar { height:8px; border-radius:99px; background:#e3e1d9; overflow:hidden; margin-top:12px; }
  .pbar > div { height:100%; border-radius:99px; background:var(--ink); transition:width .4s; }
  .pbar.red > div { background:var(--red); }
  .sub { font-size:13px; color:var(--mut); margin-top:5px; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:22px 0; text-align:center; }
  .stat { background:#fff; border:1px solid #e4e2da; border-radius:14px; padding:12px 4px; }
  .stat b { display:block; font-size:20px; }
  .stat span { font-size:11px; color:var(--mut); }
  button { font:inherit; cursor:pointer; border:none; }
  .btn { display:block; width:100%; padding:15px; border-radius:14px; font-weight:600; font-size:17px; transition:transform .05s; }
  .btn:active { transform:scale(.99); }
  .btn:disabled { opacity:.4; cursor:default; }
  .btn-red { background:var(--red); color:#fff; margin-bottom:10px; }
  .btn-navy { background:var(--ink); color:#fff; }
  .btn-line { background:#fff; color:var(--ink); border:1px solid #c9c7bf; font-size:15px; padding:13px; }
  .wallhead { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--mut); margin:30px 0 8px; }
  .region-label { font-size:12px; color:var(--faint); margin:10px 0 4px; }
  .wall { display:flex; flex-wrap:wrap; gap:4px; }
  .footnote { margin-top:28px; font-size:12px; color:var(--faint); line-height:1.6; }
  .rowtop { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
  .h2 { font-family:Georgia,serif; font-size:21px; font-weight:700; }
  .chip { background:#fff; border:1px solid #c9c7bf; border-radius:10px; padding:7px 12px; font-size:13px; font-weight:500; }
  .hint { font-size:13px; color:var(--mut); margin-bottom:12px; }
  .search { width:100%; padding:10px 12px; border-radius:10px; border:1px solid #c9c7bf; background:#fff; font:inherit; outline:none; margin-bottom:16px; }
  .search:focus { border-color:var(--ink); }
  .selhead { display:flex; align-items:center; justify-content:space-between; margin:18px 0 8px; }
  .linkbtn { background:none; font-size:12px; color:var(--mut); text-decoration:underline; padding:0; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  @media (max-width:430px){ .grid2 { grid-template-columns:1fr; } }
  .country { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:10px; border:1px solid var(--line); background:#fff; color:var(--ink); font-size:14px; text-align:left; }
  .country.on { background:var(--ink); border-color:var(--ink); color:#fff; }
  .country .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .topbar { display:flex; align-items:center; gap:12px; }
  .xbtn { background:none; color:var(--faint); font-size:22px; line-height:1; padding:2px 4px; }
  .topbar .pbar { flex:1; margin:0; }
  .qcount { font-size:12px; color:var(--mut); }
  .center { text-align:center; }
  .badge { display:inline-block; background:var(--ink); color:#fff; font-size:11px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; padding:5px 11px; border-radius:99px; margin:26px 0 22px; }
  .cname { font-family:Georgia,serif; font-size:27px; font-weight:700; margin-top:16px; }
  .cregion { font-size:13px; color:var(--mut); margin:3px 0 14px; }
  .note { font-size:13.5px; background:#FDF6E3; border:1px solid #EBDCAE; color:#7A5E10; border-radius:10px; padding:11px 14px; max-width:380px; margin:0 auto 18px; text-align:left; line-height:1.45; }
  .softline { font-size:13px; color:var(--mut); margin:0 auto 22px; max-width:380px; }
  .opts { display:grid; gap:8px; max-width:380px; margin:0 auto; }
  .opt { position:relative; padding:14px 16px; border-radius:13px; border:1px solid var(--line); background:#fff; color:var(--ink); font-weight:500; font-size:15.5px; }
  .opt:disabled { cursor:default; }
  .opts2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:380px; margin:0 auto; }
  .optflag { position:relative; padding:14px 10px 10px; border-radius:13px; border:2px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; }
  .optflag:disabled { cursor:default; }
  .optflag.ok { border-color:var(--green); background:#eaf5f0; }
  .optflag.bad { border-color:var(--red); background:#faecea; }
  .optflag.dim { opacity:.45; }
  .numtag { position:absolute; top:5px; left:8px; font-size:11px; color:var(--faint); font-weight:600; }
  .keyhint { font-size:12px; color:var(--faint); margin-top:16px; }
  .wrongmsg { font-size:14px; font-weight:500; color:var(--red); margin:18px auto 10px; max-width:380px; }
  .after { max-width:380px; margin:16px auto 0; }
  .flaghero { margin:18px 0 30px; }
  .bigemoji { font-size:52px; margin-bottom:14px; }
  .mastered-row { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:26px; }
  .maxw { max-width:380px; margin:0 auto; }
</style>
</head>
