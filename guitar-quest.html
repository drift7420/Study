<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#16243B">
<title>Fretboard Quest</title>
<style>
  :root{ --paper:#F5F4EF; --ink:#16243B; --accent:#B5651D; --green:#2A7F62; --red:#C8322B; --line:#d8d6cf; --mut:#7c8290; }
  *{ box-sizing:border-box; margin:0; }
  body{ background:var(--paper); color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; -webkit-tap-highlight-color:transparent; }
  .shell{ max-width:600px; margin:0 auto; padding:26px 16px 84px; }
  .eyebrow{ font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--mut); }
  .title{ font-family:Georgia,serif; font-size:27px; font-weight:700; margin-top:4px; }
  .sub{ font-size:13px; color:var(--mut); line-height:1.5; }
  .pbar{ height:6px; background:#e7e5de; border-radius:99px; margin:12px 0 6px; overflow:hidden; }
  .pbar>div{ height:100%; background:var(--accent); border-radius:99px; }
  .decks{ display:flex; flex-direction:column; gap:12px; margin-top:18px; }
  .deck{ display:flex; align-items:center; gap:14px; background:#fff; border:1px solid #e4e2da; border-radius:16px; padding:15px 16px; text-align:left; font:inherit; cursor:pointer; width:100%; }
  .deck .ic{ width:46px; height:46px; flex:none; border-radius:12px; background:#F3EADF; display:flex; align-items:center; justify-content:center; font-size:23px; }
  .deck .dn{ font-size:17px; font-weight:700; }
  .deck .dd{ font-size:13px; color:var(--mut); margin-top:2px; display:block; }
  .deck .dbar{ display:block; height:4px; background:#eceae3; border-radius:99px; margin-top:8px; overflow:hidden; }
  .deck .dbar>span{ display:block; height:100%; background:var(--accent); border-radius:99px; }
  .duebadge{ margin-left:auto; background:#FBE9E7; color:var(--red); font-size:12px; font-weight:700; border-radius:8px; padding:4px 8px; white-space:nowrap; }
  .donebadge{ margin-left:auto; color:var(--green); font-weight:800; font-size:18px; }
  .btn{ width:100%; padding:13px; border-radius:12px; border:none; font:inherit; font-size:15px; font-weight:600; cursor:pointer; }
  .btn-accent{ background:var(--accent); color:#fff; }
  .btn-line{ background:#fff; border:1px solid #c9c7bf; color:var(--ink); }
  .btn+.btn{ margin-top:8px; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .xbtn{ background:none; border:none; font-size:26px; color:var(--mut); cursor:pointer; line-height:1; padding:0 4px; }
  .prompt-q{ font-size:12px; color:var(--mut); text-align:center; margin:6px 0 10px; letter-spacing:.06em; text-transform:uppercase; }
  .bignote{ font-family:Georgia,serif; font-size:44px; font-weight:700; }
  .center{ text-align:center; }
  .svgwrap{ background:#fff; border:1px solid #e4e2da; border-radius:14px; padding:10px; margin:10px 0; overflow-x:auto; }
  .fb{ display:block; width:100%; height:auto; }
  .opts{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
  .opt{ padding:16px; border-radius:12px; border:1px solid #c9c7bf; background:#fff; font:inherit; font-size:18px; font-weight:700; cursor:pointer; color:var(--ink); }
  .opt.right{ background:#E6EFEA; border-color:var(--green); color:#1c5a45; }
  .opt.wrong{ background:#FBE9E7; border-color:var(--red); color:#8f241f; }
  .opt.staffopt{ padding:6px; display:flex; align-items:center; justify-content:center; }
  .feedback{ text-align:center; font-weight:700; margin-top:14px; }
  .feedback.ok{ color:var(--green); }
  .feedback.no{ color:var(--red); }
  .tapnote{ font-size:12px; color:var(--mut); text-align:center; margin-top:8px; }
  .rowtop{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .h2{ font-family:Georgia,serif; font-size:22px; font-weight:700; }
  .chip{ background:#fff; border:1px solid #c9c7bf; border-radius:10px; padding:7px 12px; font-size:13px; font-weight:600; cursor:pointer; }
  .chordgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:10px; }
  .chordcard{ background:#fff; border:1px solid #e4e2da; border-radius:12px; padding:8px 4px 6px; text-align:center; }
  .chordcard .cn{ font-weight:700; margin-top:2px; font-size:15px; }
  .codebox{ width:100%; height:84px; margin:10px 0; padding:11px 12px; border-radius:10px; border:1px solid #c9c7bf; background:#fff; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; line-height:1.4; resize:vertical; outline:none; word-break:break-all; }
</style>
</head>
<body>
<div id="root"><div style="max-width:620px;margin:40px auto;font-family:system-ui,sans-serif;color:#999">Starting up…</div></div>
