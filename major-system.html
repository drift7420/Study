<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Major System Trainer</title>
<style>
  :root{
    --bg:#EFF2EE;
    --card:#FFFFFF;
    --ink:#1F242B;
    --muted:#6B7280;
    --line:#DFE4DD;
    --teal:#0F6157;
    --teal-soft:#E2EFEC;
    --amber:#D98E2B;
    --amber-soft:#FBF0DD;
    --red:#B3402F;
    --green:#2E7D4F;
    --radius:14px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--sans);background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;max-width:520px;margin:0 auto;
    min-height:100vh;
  }
  header{padding:18px 18px 10px}
  header h1{font-size:20px;font-weight:800;letter-spacing:-0.02em}
  header h1 span{color:var(--teal)}
  header p{font-size:12.5px;color:var(--muted);margin-top:2px}
  main{flex:1;overflow-y:auto;padding:6px 14px 90px}
  .tabbar{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:520px;display:flex;background:var(--card);
    border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);
    z-index:10;
  }
  .tabbar button{
    flex:1;background:none;border:none;padding:12px 4px 10px;font-size:12px;
    color:var(--muted);font-weight:600;cursor:pointer;font-family:var(--sans);
  }
  .tabbar button .ico{display:block;font-size:18px;margin-bottom:2px}
  .tabbar button.active{color:var(--teal)}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:12px;
  }
  .pill-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .pill{
    border:1px solid var(--line);background:var(--card);border-radius:999px;
    padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;
    font-family:var(--sans);
  }
  .pill.on{background:var(--teal);border-color:var(--teal);color:#fff}
  .digits{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:10px 0 4px}
  .digit{
    display:flex;flex-direction:column;align-items:center;min-width:52px;
    background:var(--teal-soft);border-radius:10px;padding:10px 6px 8px;
  }
  .digit b{font-family:var(--mono);font-size:34px;font-weight:700;line-height:1;color:var(--teal)}
  .digit i{font-style:normal;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:0.02em}
  .digit i.show{color:var(--amber);font-weight:700}
  .btn{
    display:block;width:100%;border:none;border-radius:12px;padding:14px;
    font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);
  }
  .btn-primary{background:var(--teal);color:#fff}
  .btn-ghost{background:none;border:1px solid var(--line);color:var(--ink)}
  .btn+.btn{margin-top:8px}
  .btn-row{display:flex;gap:8px}
  .btn-row .btn{margin-top:0}
  .codebox{width:100%;height:84px;margin:10px 0;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#FBFCFA;color:var(--ink);font-family:var(--mono);font-size:12px;line-height:1.4;resize:vertical;outline:none;word-break:break-all;box-sizing:border-box}
  .reveal{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
  .chunk{
    display:flex;align-items:baseline;gap:10px;padding:7px 4px;
  }
  .chunk .num{font-family:var(--mono);font-size:17px;font-weight:700;width:42px;color:var(--teal)}
  .chunk .word{font-size:18px;font-weight:700}
  .chunk .snd{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .stat-row{display:flex;gap:10px}
  .stat{
    flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px;text-align:center;margin-bottom:12px;
  }
  .stat b{display:block;font-family:var(--mono);font-size:22px;color:var(--teal)}
  .stat span{font-size:11.5px;color:var(--muted);font-weight:600}
  label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin:10px 0 4px}
  input[type=text],input[type=tel]{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:12px;
    font-size:16px;font-family:var(--sans);background:#FBFCFA;color:var(--ink);
  }
  input.mono{font-family:var(--mono);letter-spacing:0.08em}
  input:focus{outline:2px solid var(--teal);border-color:var(--teal)}
  .entry{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:var(--card)}
  .entry-head{display:flex;justify-content:space-between;align-items:center}
  .entry-head h3{font-size:15px}
  .entry-num{font-family:var(--mono);font-size:18px;letter-spacing:0.12em;color:var(--teal);margin-top:4px;font-weight:700}
  .entry .small{font-size:12px;color:var(--muted);margin-top:6px}
  .link{background:none;border:none;color:var(--teal);font-weight:700;font-size:13px;cursor:pointer;font-family:var(--sans);padding:4px}
  .link.danger{color:var(--red)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  td,th{padding:9px 6px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .snd-cell{font-family:var(--mono);font-weight:700;color:var(--teal);font-size:16px}
  .digit-cell{font-family:var(--mono);font-weight:700;font-size:18px}
  .hint{font-size:12.5px;color:var(--muted)}
  .feedback{margin-top:10px;font-weight:700;font-size:15px;text-align:center}
  .feedback.ok{color:var(--green)}
  .feedback.bad{color:var(--red)}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:20px 8px}
  .section-title{font-size:13px;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);margin:14px 4px 8px}
  .peg-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;font-size:13.5px}
  .peg-grid div{padding:5px 2px;border-bottom:1px solid var(--line);display:flex;gap:8px}
  .peg-grid .n{font-family:var(--mono);font-weight:700;color:var(--teal);width:24px}
  details summary{cursor:pointer;font-weight:700;font-size:14px;padding:6px 0}
  .quiz-label{font-size:13px;color:var(--muted);font-weight:700;text-align:center}
  .quiz-name{font-size:22px;font-weight:800;text-align:center;margin:6px 0 12px}
  .choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .choice-grid .btn{margin:0;font-family:var(--mono);font-size:16px}
  .choice-grid .btn.right{background:var(--green);color:#fff;border-color:var(--green)}
  .choice-grid .btn.wrong{background:var(--red);color:#fff;border-color:var(--red)}
  .big-digit{font-family:var(--mono);font-size:64px;font-weight:800;text-align:center;color:var(--teal);line-height:1.1}
  .pegrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .pegrow .code{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--teal);min-width:34px}
  .pegrow .snd2{font-family:var(--mono);font-size:10.5px;color:var(--muted);min-width:62px;line-height:1.25}
  .pegrow input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:15px;font-weight:600;font-family:var(--sans);background:#FBFCFA;color:var(--ink);min-width:0}
  .pegrow .idea-btn{background:var(--amber-soft);border:1px solid #EAD3A6;color:var(--amber);border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);white-space:nowrap}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 6px 44px}
  .chip{background:var(--teal-soft);border:1px solid #BFDDD6;color:var(--teal);border-radius:999px;padding:5px 11px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)}
  .scene-box{background:var(--amber-soft);border:1px solid #EAD3A6;border-radius:12px;padding:14px;margin-top:12px;font-size:14.5px;line-height:1.5}
  .scene-box b{color:var(--teal)}
  .loading{color:var(--muted);font-size:13px;font-weight:600;padding:4px 0}
  .chk{font-size:12px;font-weight:700;margin:2px 0 4px 44px;font-family:var(--mono)}
  .chk.ok{color:var(--green)}
  .chk.bad{color:var(--red)}
  .err{color:var(--red);font-size:12.5px;margin-top:6px}
  @media (prefers-reduced-motion: no-preference){
    .card{animation:fade .18s ease}
    @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }
</style>
</head>

<header>
  <h1>Major<span>.</span> System Trainer</h1>

</header>

</nav>

function soundsFor(d){ return SOUNDS[+d]; }
function chunkNumber(numStr){
  const chunks = [];
  let i = 0;
  while (i < numStr.length){
    if (numStr.length - i >= 2){ chunks.push(numStr.slice(i, i+2)); i += 2; }
    else { chunks.push(numStr.slice(i, i+1)); i += 1; }
  }
  return chunks;
}
function pegFor(chunk){
  if (chunk.length === 2) return PEG2[+chunk];
  if (chunk.length === 1) return PEG1[+chunk];
  return ""; // 3-4 digit chunks have no fixed peg — tap Ideas for a single word
}
/* split a number string into chunks given a grouping preset */
function chunkCodes(number, grouping){
  const n = number.length;
  let sizes;
  if (grouping === "phone"){
    sizes = (n === 10) ? [3,3,4] : (n === 7 ? [3,4] : uniformSizes(n,3));
  } else if (grouping === "auto"){
    if (n === 10) sizes = [3,3,4];
    else if (n === 7) sizes = [3,4];
    else sizes = uniformSizes(n, 3);
  } else {
    sizes = uniformSizes(n, parseInt(grouping,10) || 2);
  }
  const out = []; let i = 0;
  for (const s of sizes){ out.push(number.slice(i, i+s)); i += s; }
  return out;
}
function uniformSizes(n, size){
  const sizes = []; let r = n;
  while (r > 0){ sizes.push(Math.min(size, r)); r -= size; }
  // merge an awkward trailing single digit into the previous chunk
  if (sizes.length > 1 && sizes[sizes.length-1] === 1){
    sizes[sizes.length-2] += 1; sizes.pop();
  }
  return sizes;
}

let state = { numbers: [], stats: { day:"", reps:0, streak:0, lastStreakDay:"" } };
const KEY = "major-system-data";

/* storage: claude.ai (window.storage) → browser localStorage → memory */
const mem = {};
const store = {
  async get(k){ try{ if(window.storage){ const r=await window.storage.get(k); return r?r.value:null; } }catch(e){} try{ return localStorage.getItem(k); }catch(e){} return mem[k]??null; },
  async set(k,v){ try{ if(window.storage){ await window.storage.set(k,v); return; } }catch(e){} try{ localStorage.setItem(k,v); return; }catch(e){} mem[k]=v; },
};
/* backup codes — unicode-safe base64 */
function encodeBackup(raw){ try{ return btoa(unescape(encodeURIComponent(raw))); }catch(e){ return ""; } }
function decodeBackup(code){ return decodeURIComponent(escape(atob((code||"").trim()))); }

async function loadState(){
  try{
    const r = await store.get(KEY);
    if (r) state = JSON.parse(r);
  }catch(e){ /* first run — nothing saved yet */ }
  if (!state.stats) state.stats = { day:"", reps:0, streak:0, lastStreakDay:"" };
  if (state.stats.day !== today()){ state.stats.day = today(); state.stats.reps = 0; }
  // migrate entries saved before custom pegs/scenes existed
  (state.numbers||[]).forEach(e => {
    if (!Array.isArray(e.chunks)) e.chunks = makeChunks(e.number, e.grouping);
    if (typeof e.scene !== "string") e.scene = "";
    if (!e.grouping) e.grouping = "2"; // pre-existing entries were paired
  });
}
async function saveState(){
  try{ await store.set(KEY, JSON.stringify(state)); }
  catch(e){ console.error("Save failed", e); }
}
function bumpRep(){
  const t = today();
  state.stats.reps++;
  if (state.stats.lastStreakDay !== t){
    const y = new Date(Date.now() - 864e5).toISOString().slice(0,10);
    state.stats.streak = (state.stats.lastStreakDay === y) ? state.stats.streak + 1 : 1;
    state.stats.lastStreakDay = t;
  }
  saveState();
}

/* transient (non-persisted) UI state */
const ui = { ideas:{}, errScene:{} };

/* WORDBANK is defined near the top (code -> array of words that encode it) */

/* forward index (word -> code) built from the phoneme-accurate WORDBANK */
let WORDFWD = null;
function wordFwd(){
  if (WORDFWD) return WORDFWD;
  WORDFWD = {};
  for (const code in WORDBANK)
    for (const w of WORDBANK[code])
      if (!(w in WORDFWD)) WORDFWD[w] = code;
  return WORDFWD;
}

/* spelling-based Major decoder — handles the common digraph/silent cases.
   Used only for words not in the phoneme index. */
function spellDecode(raw){
  let w = (raw||"").toLowerCase().replace(/[^a-z]/g,"");
  if (!w) return "";
  w = w.replace(/^(kn|gn|pn|ps|mn|wr)/, m => m[1]); // silent leading consonant
  w = w.replace(/mb$/,"m").replace(/mn$/,"m");        // silent final b / n
  w = w.replace(/stle$/,"sle").replace(/sten$/,"sen").replace(/ften/,"fen"); // silent t (castle, listen, often)
  w = w.replace(/([ao])l([kmf])/g,"$1$2");            // silent l (talk, walk, calm, palm, half)
  const V = c => "aeiou".includes(c);
  let out = "", i = 0;
  while (i < w.length){
    const c = w[i], c2 = w[i+1]||"", c3 = w[i+2]||"";
    const three = c+c2+c3, two = c+c2;
    if (three === "tch" || three === "dge"){ out+="6"; i+=3; continue; }
    if (two === "ch" || two === "sh"){ out+="6"; i+=2; continue; }
    if (two === "th"){ out+="1"; i+=2; continue; }
    if (two === "ph"){ out+="8"; i+=2; continue; }
    if (two === "gh"){ i+=2; continue; }   // usually silent
    if (two === "ck"){ out+="7"; i+=2; continue; }
    if (two === "qu"){ out+="7"; i+=2; continue; }
    if (two === "ng"){ out+="7"; i+=2; continue; }
    if (two === "wh"){ i+=2; continue; }
    let d = "";
    switch(c){
      case "s": case "z": d="0"; break;
      case "x": out+="70"; i++; continue;
      case "t": case "d": d="1"; break;
      case "n": d="2"; break;
      case "m": d="3"; break;
      case "r": d="4"; break;
      case "l": d="5"; break;
      case "j": d="6"; break;
      case "k": case "q": d="7"; break;
      case "f": case "v": d="8"; break;
      case "p": case "b": d="9"; break;
      case "c": d = "eiy".includes(c2) ? "0" : "7"; break;
      case "g": d = "eiy".includes(c2) ? "6" : "7"; break;
      default: d = ""; // vowels, w, h, y
    }
    out += d;
    if (c2 === c && !V(c)) i++; // collapse doubled consonant
    i++;
  }
  return out;
}
/* decode a peg (single word, or a multi-word pair) to its Major code */
function decodeWord(str){
  const fwd = wordFwd();
  return (str||"").toLowerCase().split(/[\s\-]+/).filter(Boolean)
    .map(tok => fwd[tok] !== undefined ? fwd[tok] : spellDecode(tok))
    .join("");
}

function pegOptions(code){
  // words that encode this exact code
  if (WORDBANK[code] && WORDBANK[code].length) return WORDBANK[code].slice();
  if (code.length === 2 && PEG2[+code]) return [PEG2[+code]];
  if (code.length === 1 && PEG1[+code]) return [PEG1[+code]];
  return [];
}
function splitSuggestions(code){
  // for codes with no single word, pair words for sub-parts -> "wordA wordB"
  let parts;
  if (code.length === 4) parts = [[2,2]];
  else if (code.length === 3) parts = [[2,1],[1,2]];
  else parts = [];
  const combos = [];
  for (const [a,b] of parts){
    const A = pegOptions(code.slice(0,a)), B = pegOptions(code.slice(a));
    for (let k=0; k<4 && k<Math.max(A.length,B.length); k++){
      const w1 = A[k % A.length], w2 = B[k % B.length];
      if (w1 && w2) combos.push(w1 + " " + w2);
    }
  }
  return [...new Set(combos)].slice(0,6);
}
function getIdeas(ei, ci){
  const e = state.numbers[ei], ch = e.chunks[ci], key = ei+"-"+ci;
  let single = pegOptions(ch.code).filter(w => w !== ch.word);
  let words = single.slice(0,6), note = "";
  if (ch.code.length >= 3){
    const split = splitSuggestions(ch.code).filter(w => !words.includes(w));
    if (words.length === 0){ words = split.slice(0,6); note = "no single word — try a pair:"; }
    else if (words.length < 3){ words = words.concat(split).slice(0,6); note = "single words, or a pair:"; }
  }
  ui.ideas[key] = { words, note };
  render();
}

  "crushes","is juggling","sets fire to","crashes through"];
function buildScene(ei){
  const e = state.numbers[ei];
  if (e.chunks.some(c => !c.word || !c.word.trim())){
    ui.errScene[ei] = "Fill in every word first (tap Ideas on the blank rows).";
    render(); return;
  }
  delete ui.errScene[ei];
  const w = e.chunks.map(c => c.word.trim());
  const used = [];
  const pick = () => {
    let opts = LINKS.filter(l => !used.includes(l));
    if (!opts.length){ used.length = 0; opts = LINKS.slice(); }
    const l = opts[Math.floor(Math.random()*opts.length)];
    used.push(l); return l;
  };
  let parts = [`Picture a giant <b>${esc(w[0])}</b>`];
  for (let i=1;i<w.length;i++) parts.push(`${pick()} a <b>${esc(w[i])}</b>`);
  // stitch into sentences, ~3 images each
  let scene = "", buf = [];
  parts.forEach((p,i) => {
    buf.push(p);
    if (buf.length === 3 || i === parts.length-1){
      scene += buf.join(", ") + ". ";
      buf = [];
      if (i < parts.length-1) buf.push(`That <b>${esc(w[i])}</b>`);
    }
  });
  e.scene = scene.trim();
  saveState(); render();
}

function setChunkWord(ei, ci, val){
  state.numbers[ei].chunks[ci].word = val.trim();
  saveState(); render();
}
function pickIdea(ei, ci, word){
  state.numbers[ei].chunks[ci].word = word;
  delete ui.ideas[ei+"-"+ci];
  saveState(); render();
}

function groupingPills(current, onclickFn){
  const opts = [["auto","Auto"],["phone","Phone 3-3-4"],["2","Pairs"],["3","Triples"],["4","Quads"]];
  return `<div class="pill-row" style="margin-top:10px">` + opts.map(([v,lbl]) =>
    `<button class="pill ${current===v?'on':''}" onclick="${onclickFn}('${v}')">${lbl}</button>`).join('') + `</div>`;
}
let newGrouping = "auto";
let draft = { label:"", number:"" };
function setNewGrouping(g){ newGrouping = g; render(); }

function renderNumbers(){
  let html = `<div class="card">
    <label for="new-label">What is it?</label>
    <input type="text" id="new-label" value="${esc(draft.label)}" oninput="draft.label=this.value" placeholder="e.g., Gym locker code" autocomplete="off">
    <label for="new-num">The number</label>
    <input type="tel" id="new-num" class="mono" value="${esc(draft.number)}" oninput="draft.number=this.value" inputmode="numeric" placeholder="e.g., 4172" autocomplete="off">
    <label style="margin-top:12px">Chunking</label>
    ${groupingPills(newGrouping, "setNewGrouping")}
    <button class="btn btn-primary" style="margin-top:6px" onclick="addNumber()">Save &amp; build pegs</button>
  </div>
  <p class="section-title">Saved numbers</p>`;

  if (!state.numbers.length){
    html += `<p class="empty">Nothing saved yet. Add a PIN, phone number, or any digits you want to lock in.</p>`;
  } else {
    html += state.numbers.map((e,i) => {
      let body = "";
      if (e.open){
        body += `<div class="reveal">
          <label style="margin:0 0 2px">Chunking</label>
          ${groupingPills(e.grouping||"auto", "(function(g){return rechunk("+i+",g)})")}
          <p class="hint" style="margin-bottom:6px">Edit any word to one <em>you</em> find vivid, or tap <b>Ideas</b> for words that fit the sounds. For 3–4 digit chunks, Ideas finds one word for the whole group when one exists.</p>`;
        body += e.chunks.map((ch,ci) => {
          const key = i+"-"+ci;
          let rows = `<div class="pegrow">
            <span class="code">${ch.code}</span>
            <span class="snd2">${[...ch.code].map(soundsFor).join('·')}</span>
            <input type="text" value="${esc(ch.word)}" placeholder="tap Ideas →" onchange="setChunkWord(${i},${ci},this.value)" autocomplete="off">
            <button class="idea-btn" onclick="getIdeas(${i},${ci})">Ideas</button>
          </div>`;
          if (ch.word && ch.word.trim()){
            const dec = decodeWord(ch.word), ok = dec === ch.code;
            rows += `<div class="chk ${ok?'ok':'bad'}">${ok?'✓':'✗'} ${esc(ch.word)} = ${dec||'—'}${ok?'':' · needs '+ch.code}</div>`;
          }
          const sug = ui.ideas[key];
          if (sug && sug.words.length){
            rows += `<div class="chips">${sug.note?'<span class="hint" style="width:100%;margin:0 0 2px">'+sug.note+'</span>':''}${sug.words.map(w=>`<button class="chip" onclick="pickIdea(${i},${ci},'${esc(w).replace(/'/g,"\\'")}')">${esc(w)}</button>`).join('')}</div>`;
          } else if (sug){
            rows += `<p class="err" style="margin-left:44px">No match found — type your own word for ${ch.code}.</p>`;
          }
          return rows;
        }).join('');

        body += `<button class="btn btn-primary" style="margin-top:12px" onclick="buildScene(${i})">${e.scene?'Shuffle the scene':'Weave into a vivid scene'}</button>`;
        if (ui.errScene[i]) body += `<p class="err">${ui.errScene[i]}</p>`;
        if (e.scene) body += `<div class="scene-box">${e.scene}</div>`;
        body += `</div>`;
      }
      return `<div class="entry">
        <div class="entry-head">
          <h3>${esc(e.label)}</h3>
          <span>
            <button class="link" onclick="toggleEntry(${i})">${e.open?'Hide':'Open'}</button>
            <button class="link danger" onclick="removeNumber(${i})">Delete</button>
          </span>
        </div>
        <div class="entry-num">${e.number}</div>
        ${body}
        <p class="small">${e.lastPracticed ? 'Last recalled '+e.lastPracticed : 'Not practiced yet'}</p>
      </div>`;
    }).join('');
  }
  return html;
}
function makeChunks(number, grouping){
  return chunkCodes(number, grouping || "auto").map(code => ({ code, word: pegFor(code) }));
}
function addNumber(){
  const label = (document.getElementById('new-label').value || draft.label).trim();
  const number = (document.getElementById('new-num').value || draft.number || "").replace(/\D/g,"");
  if (!label || !number){ alert("Add both a name and the digits."); return; }
  state.numbers.unshift({ label, number, open:true, lastPracticed:null, grouping:newGrouping, chunks:makeChunks(number, newGrouping), scene:"" });
  draft = { label:"", number:"" };
  saveState(); render();
}
function rechunk(i, grouping){
  const e = state.numbers[i];
  if (grouping === e.grouping) return;
  const hadCustom = e.chunks.some((c,ci)=> c.word !== pegFor(c.code)) || e.scene;
  if (hadCustom && !confirm("Re-grouping rebuilds the word rows and clears the current scene. Continue?")) return;
  e.grouping = grouping;
  e.chunks = makeChunks(e.number, grouping);
  e.scene = "";
  // clear transient ideas for this entry
  Object.keys(ui.ideas).forEach(k => { if (k.startsWith(i+"-")) delete ui.ideas[k]; });
  saveState(); render();
}
function removeNumber(i){
  if (!confirm("Delete \"" + state.numbers[i].label + "\"?")) return;
  state.numbers.splice(i,1); saveState(); render();
}
function toggleEntry(i){ state.numbers[i].open = !state.numbers[i].open; render(); }

/* ---------- Learn tab ---------- */
function renderLearn(){
  let html = `<div class="card">
    <table>
      <tr><th>Digit</th><th>Sounds</th><th>Memory hook</th></tr>
      ${SOUNDS.map((s,i)=>`<tr><td class="digit-cell">${i}</td><td class="snd-cell">${s}</td><td class="hint">${HOOKS[i]}</td></tr>`).join('')}
    </table>
    <p class="hint" style="margin-top:10px">Only consonant <em>sounds</em> count — vowels and w, h, y are free filler. "Knife" is n + f = 28, because the k is silent.</p>
  </div>
  <div class="card">
    <details>
      <summary>Peg words 00–99</summary>
      <div class="peg-grid" style="margin-top:8px">
        ${PEG2.map((w,i)=>`<div><span class="n">${String(i).padStart(2,'0')}</span><span>${w}</span></div>`).join('')}
      </div>
      <p class="hint" style="margin-top:10px">These are suggestions — any word with the right consonant sounds works. Pick images you find vivid.</p>
    </details>
  </div>`;
  return html;
}

/* ---------- Render ---------- */
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
/* ---------- Backup tab ---------- */
function renderBackup(){
  const n = (state.numbers||[]).length;
  return `<div class="card">
    <h2 style="margin:0 0 4px;font-size:17px">Backup &amp; devices</h2>
    <p class="hint" style="margin-bottom:14px">Your saved numbers live only in this browser (${n} saved). Use this to move them to another device — or from a downloaded file to the hosted version.</p>
    <p class="hint" style="font-weight:700;color:var(--ink);margin-bottom:6px">1 · Export from here</p>
    <button class="btn btn-primary" onclick="doExport()">Generate my code</button>
    <textarea id="export-box" readonly class="codebox" style="display:none" onclick="this.select()"></textarea>
    <button id="copy-btn" class="btn btn-ghost" style="display:none" onclick="doCopy()">Copy code</button>
  </div>
  <div class="card">
    <p class="hint" style="font-weight:700;color:var(--ink);margin-bottom:6px">2 · Import on the other device</p>
    <p class="hint" style="margin-bottom:8px">Paste a code, then load it. This replaces whatever is saved here now.</p>
    <textarea id="import-box" class="codebox" placeholder="Paste your code here…"></textarea>
    <button class="btn btn-primary" onclick="doImport()">Load this code</button>
    <p id="backup-status" class="hint" style="margin-top:10px"></p>
  </div>`;
}
function doExport(){
  const code = encodeBackup(JSON.stringify(state));
  const ta = document.getElementById('export-box');
  const cb = document.getElementById('copy-btn');
  if (ta){ ta.value = code; ta.style.display='block'; ta.focus(); ta.select(); }
  if (cb){ cb.style.display='block'; cb.textContent='Copy code'; }
}
function doCopy(){
  const ta = document.getElementById('export-box'); if (!ta) return;
  try{ navigator.clipboard.writeText(ta.value); }catch(e){ ta.select(); try{ document.execCommand('copy'); }catch(_){} }
  const cb = document.getElementById('copy-btn'); if (cb) cb.textContent='Copied ✓';
}
async function doImport(){
  const box = document.getElementById('import-box');
  const status = document.getElementById('backup-status');
  try{
    const data = JSON.parse(decodeBackup(box ? box.value : ""));
    if (!data || typeof data !== "object" || !Array.isArray(data.numbers)) throw new Error("bad");
    state = data;
    await saveState();
    if (status) status.textContent = "Imported! Reloading…";
    setTimeout(()=>{ try{ location.reload(); }catch(e){ window.location.href = window.location.href; } }, 600);
  }catch(e){
    if (status) status.textContent = "That code didn't work — make sure you pasted the whole thing.";
  }
}

function render(){
  ["practice","decode","numbers","learn","backup"].forEach(t =>
    document.getElementById("tab-"+t).classList.toggle("active", tab===t));
  const main = document.getElementById("main");
  if (tab === "practice") main.innerHTML = renderPractice();
  if (tab === "decode") main.innerHTML = renderDecode();
  if (tab === "numbers") main.innerHTML = renderNumbers();
  if (tab === "learn") main.innerHTML = renderLearn();
  if (tab === "backup") main.innerHTML = renderBackup();
}

(async function init(){
  await loadState();
  newDrillNumber(); newSoundQuiz(); newRecallQuiz(); newDecode();
  render();
})();
</script>
