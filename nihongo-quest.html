<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nihongo Quest</title>
<style>
  :root{ --paper:#F5F4EF; --ink:#16243B; --red:#C8322B; --green:#2A7F62; --line:#d8d6cf; --mut:#7c8290; --faint:#a8adb8; }
  *{ box-sizing:border-box; margin:0; }
  body{ background:var(--paper); color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
  .jp{ font-family:"Hiragino Sans","Yu Gothic",YuGothic,"Noto Sans JP",Meiryo,sans-serif; }
  .shell{ max-width:640px; margin:0 auto; padding:24px 16px 48px; }
  .eyebrow{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--mut); }
  .title{ font-family:Georgia,serif; font-size:28px; font-weight:700; margin-top:2px; }
  .sub{ font-size:13px; color:var(--mut); margin-top:5px; }
  .pbar{ height:8px; border-radius:99px; background:#e3e1d9; overflow:hidden; margin-top:12px; }
  .pbar>div{ height:100%; border-radius:99px; background:var(--ink); transition:width .4s; }
  .pbar.red>div{ background:var(--red); }
  button{ font:inherit; cursor:pointer; border:none; }
  .btn{ display:block; width:100%; padding:15px; border-radius:14px; font-weight:600; font-size:17px; transition:transform .05s; }
  .btn:active{ transform:scale(.99); }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn-red{ background:var(--red); color:#fff; margin-bottom:10px; }
  .btn-navy{ background:var(--ink); color:#fff; }
  .btn-line{ background:#fff; color:var(--ink); border:1px solid #c9c7bf; font-size:15px; padding:13px; }
  .decks{ display:flex; flex-direction:column; gap:10px; margin:22px 0 8px; }
  .deck{ display:flex; align-items:center; gap:14px; background:#fff; border:1px solid #e4e2da; border-radius:16px; padding:16px; text-align:left; transition:transform .05s; }
  .deck:active{ transform:scale(.995); }
  .deck .ic{ font-size:26px; width:34px; text-align:center; }
  .deck .meta{ flex:1; }
  .deck .dn{ font-weight:600; font-size:16px; }
  .deck .dd{ font-size:12px; color:var(--mut); margin-top:2px; }
  .deck .dbar{ height:6px; border-radius:99px; background:#ece9e1; overflow:hidden; margin-top:7px; }
  .deck .dbar>div{ height:100%; background:var(--green); border-radius:99px; }
  .duebadge{ background:var(--red); color:#fff; font-size:11px; font-weight:700; border-radius:99px; padding:3px 9px; }
  .donebadge{ color:var(--green); font-size:18px; }
  .footnote{ margin-top:24px; font-size:12px; color:var(--faint); line-height:1.6; }
  .topbar{ display:flex; align-items:center; gap:12px; }
  .xbtn{ background:none; color:var(--faint); font-size:22px; line-height:1; padding:2px 4px; }
  .topbar .pbar{ flex:1; margin:0; }
  .qcount{ font-size:12px; color:var(--mut); }
  .center{ text-align:center; }
  .badge{ display:inline-block; background:var(--ink); color:#fff; font-size:11px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; padding:5px 11px; border-radius:99px; }
  .prompt-q{ font-size:13px; color:var(--mut); margin-top:24px; }
  .glyph{ font-size:120px; line-height:1.1; font-weight:500; }
  .word{ font-size:52px; line-height:1.2; font-weight:600; }
  .reading{ font-size:18px; color:var(--mut); margin-top:6px; }
  .sentence{ font-size:30px; line-height:1.6; font-weight:500; margin:14px 0 4px; }
  .blank{ color:var(--red); border-bottom:3px solid var(--red); padding:0 14px; }
  .enghint{ font-size:14px; color:var(--mut); font-style:italic; margin-bottom:8px; }
  .opts{ display:grid; gap:8px; max-width:400px; margin:20px auto 0; }
  .opts.two{ grid-template-columns:1fr 1fr; }
  .opt{ position:relative; padding:14px 16px; border-radius:13px; border:1px solid var(--line); background:#fff; color:var(--ink); font-weight:500; font-size:16px; }
  .opt.big{ font-size:30px; padding:18px 10px; }
  .opt:disabled{ cursor:default; }
  .numtag{ position:absolute; top:5px; left:9px; font-size:11px; color:var(--faint); font-weight:700; }
  .speaker{ display:inline-flex; align-items:center; justify-content:center; width:120px; height:120px; border-radius:50%; background:var(--ink); color:#fff; font-size:48px; margin:14px auto; border:none; }
  .speaker:active{ transform:scale(.97); }
  .keyhint{ font-size:12px; color:var(--faint); margin-top:18px; }
  .after{ max-width:400px; margin:16px auto 0; }
  .note{ font-size:13.5px; background:#FDF6E3; border:1px solid #EBDCAE; color:#7A5E10; border-radius:10px; padding:11px 14px; max-width:400px; margin:0 auto 12px; text-align:left; line-height:1.45; }
  .wrongmsg{ font-size:14px; font-weight:500; color:var(--red); margin:14px auto 10px; max-width:400px; }
  .mic{ width:96px; height:96px; border-radius:50%; background:var(--red); color:#fff; font-size:40px; display:inline-flex; align-items:center; justify-content:center; margin:8px auto; }
  .mic.live{ animation:pulse 1s infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(200,50,43,.45);} 50%{ box-shadow:0 0 0 16px rgba(200,50,43,0);} }
  .heard{ font-size:22px; font-weight:600; margin:10px 0; }
  .bigemoji{ font-size:52px; margin-bottom:8px; }
  .maxw{ max-width:400px; margin:0 auto; }
  .romaji{ font-size:15px; color:var(--mut); margin-top:4px; }
  .rowtop{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .h2{ font-family:Georgia,serif; font-size:22px; font-weight:700; }
  .chip{ background:#fff; border:1px solid #c9c7bf; border-radius:10px; padding:7px 12px; font-size:13px; font-weight:600; }
  .hint{ font-size:13px; color:var(--mut); margin-bottom:14px; line-height:1.5; }
  .search{ width:100%; padding:11px 12px; border-radius:10px; border:1px solid #c9c7bf; background:#fff; font:inherit; font-size:16px; outline:none; }
  .search:focus{ border-color:var(--ink); }
  .fieldlabel{ display:block; font-size:12px; color:var(--mut); margin-bottom:5px; font-weight:600; }
  .wordrow{ display:flex; align-items:center; gap:10px; background:#fff; border:1px solid #e4e2da; border-radius:10px; padding:9px 12px; margin-bottom:7px; }
  .speak-mini{ background:none; color:var(--ink); font-size:16px; padding:4px; }
  .del-mini{ background:none; color:var(--faint); font-size:14px; padding:4px 6px; }
  .del-mini:hover{ color:var(--red); }
</style>
</head>
<body>
